name: Scheduled DB Seeder

on:
  # Каждые 2 часа — всегда production
  schedule:
    - cron: "0 */2 * * *"
  # Ручной запуск: выбор среды через input
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (production or staging)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  seed:
    name: Run Scopus Seeder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install seeder dependencies
        # Устанавливаем только нужные пакеты — не тянем весь requirements.txt
        run: pip install httpx asyncpg colorama

      - name: Run seeder (production)
        # Запускается при schedule (всегда production) или workflow_dispatch с environment=production
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'production' }}
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_SUPABASE_URL }}
          SEEDER_SECRET:      ${{ secrets.SEEDER_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # SEEDER_BASE_URL не задан — seed_db.py использует фолбэк на production URL
        working-directory: db_seeder/seeder__scripts
        run: python seed_db.py

      - name: Run seeder (staging)
        # Запускается только при ручном workflow_dispatch с environment=staging
        if: ${{ github.event.inputs.environment == 'staging' }}
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_SUPABASE_STAGING_URL }}
          SEEDER_SECRET:      ${{ secrets.SEEDER_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEEDER_BASE_URL:    ${{ secrets.RAILWAY_STAGING_BASE_URL }}
        working-directory: db_seeder/seeder__scripts
        run: python seed_db.py
