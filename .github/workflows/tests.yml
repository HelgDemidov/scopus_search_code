name: Python tests

# События, при которых запускается CI
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# Устанавливаем Node.js 24 для всех actions в этом workflow заранее официального дедлайна (02.06.2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

 # Выбираем ОС для виртуальной машины
jobs:
  # ---------------------------------------------------------------------------
  # Джоб 1: SQLite, быстрый, без внешних зависимостей
  # Не включает requires_pg — GET /articles/find требует pg_advisory_lock.
  # Coverage сохраняется как артефакт и объединяется в джобе coverage.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    env:
      SCOPUS_API_KEY: "dummy_key_for_tests"
      SECRET_KEY: "supersecretkey_for_ci_tests_only"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/testdb"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7.0.0

    - name: set up Python 3.12
      uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.12"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio aiosqlite httpx pytest-cov

    - name: Run Pytest with Coverage
      run: |
        python -m pytest tests -vv --cov=app --cov-report=term-missing -m "not requires_pg"

    - name: Prepare coverage artifact
      # upload-artifact@v4 не загружает dotfiles по умолчанию — копируем без ведущей точки
      run: mkdir -p coverage-data && cp .coverage coverage-data/coverage.sqlite

    - name: Upload SQLite coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-sqlite
        path: coverage-data/coverage.sqlite

  # ---------------------------------------------------------------------------
  # Джоб 2: PostgreSQL 16 in-process, полная изоляция
  # Запускает только requires_pg тесты; генерирует coverage-артефакт.
  # ---------------------------------------------------------------------------
  test-pg:
    runs-on: ubuntu-latest

    # GitHub поднимает этот контейнер рядом с VM, убивает его после джоба
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SCOPUS_API_KEY: "dummy_key_for_tests"
      SECRET_KEY: "supersecretkey_for_ci_tests_only"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      # DATABASE_URL нужен Pydantic Settings при старте приложения
      DATABASE_URL: "postgresql+asyncpg://testuser:testpass@localhost:5432/testdb"
      # DATABASE_TEST_URL читается conftest.py — включает pg_* фикстуры
      DATABASE_TEST_URL: "postgresql+asyncpg://testuser:testpass@localhost:5432/testdb"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      # Проверяем что все модели покрыты миграциями (upgrade head → check)
      # Запускается ДО pytest: conftest делает drop_all/create_all, что обходит alembic
      - name: Check Alembic migrations
        run: |
          alembic upgrade head
          alembic check

      - name: Run PostgreSQL integration tests
        run: |
          python -m pytest tests/integration -vv -m requires_pg --cov=app --cov-report=term-missing

      - name: Prepare coverage artifact
        run: mkdir -p coverage-data && cp .coverage coverage-data/coverage.pg

      - name: Upload PG coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pg
          path: coverage-data/coverage.pg

  # ---------------------------------------------------------------------------
  # Джоб 3: объединяет coverage из test + test-pg и проверяет суммарный порог
  # Запускается только если оба предыдущих джоба прошли успешно.
  # ---------------------------------------------------------------------------
  coverage:
    name: Combined Coverage Check
    runs-on: ubuntu-latest
    needs: [test, test-pg]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Combine and check coverage
        run: |
          coverage combine coverage.sqlite coverage.pg
          coverage report --fail-under=75 --include="app/*"

  # ---------------------------------------------------------------------------
  # Job 4: статический анализ кода + аудит зависимостей
  # Параллельно с test/test-pg — не увеличивает wall-clock время CI.
  # ruff/mypy уже в requirements.txt; pip-audit ставится отдельно.
  # ---------------------------------------------------------------------------
  quality:
    name: Code quality (ruff + mypy + pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy type check
        run: mypy app

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
