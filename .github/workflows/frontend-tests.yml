name: Frontend tests

# Запускается при каждом push в ветки anonymous-pagination, authorized-pagination,
# english-version, fixing-vulnerabilities и main
on:
  push:
    branches:
      - anonymous-pagination
      - authorized-pagination
      - english-version
      - fixing-vulnerabilities
      - main
    # Запускаем только когда меняется frontend или сам воркфлоу
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'

# Node.js 24 обязателен для actions/setup-node@v4 начиная с 02.06.2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: полная проверка типов (tsc --noEmit)
  # Закрывает разрыв между vitest/esbuild (без тайп-чекинга) и Vercel (tsc -b + vite build)
  # Выполняется параллельно с unit и integration — не увеличивает wall-clock время CI
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (tsc --noEmit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit: полная проверка типов, без генерации JS-вывода
      # Отдельный job — ошибки типов и падения тестов видны раздельно в GitHub Actions UI
      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 1: unit-тесты
  # Запускает все *.test.{ts,tsx} кроме интеграционных файлов
  # Глобы src/**/*.test.ts и src/**/*.test.tsx НЕ в кавычках — bash раскрывает
  # их в реальные пути до передачи в vitest (аналогично ветке main)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --exclude в кавычках: передаётся как флаг vitest, он сам обрабатывает паттерн
      # Позиционные аргументы без кавычек: bash раскрывает глобы в список файлов
      - name: Run unit tests
        run: |
          npx vitest run \
            --reporter=verbose \
            --exclude 'src/**/*.integration.test.*' \
            src/**/*.test.ts \
            src/**/*.test.tsx

  # ---------------------------------------------------------------------------
  # Job 2: интеграционные тесты
  # Явные пути к файлам вместо glob — надёжнее glob-матчинга в vitest v4.1.5
  #   - src/components/articles/pagination.integration.test.tsx (пагинация)
  #   - src/App.integration.test.tsx (auth event bus)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Явные пути — bash не раскрывает, vitest получает конкретные файлы
      - name: Run integration tests
        run: |
          npx vitest run \
            --reporter=verbose \
            src/components/articles/pagination.integration.test.tsx \
            src/App.integration.test.tsx

      # Покрытие — отдельный шаг, чтобы не прерывать run при threshold-failures
      - name: Collect coverage for pagination modules
        run: |
          npx vitest run \
            --coverage \
            src/components/articles/pagination.integration.test.tsx \
            src/App.integration.test.tsx

      # Публикуем coverage summary в GitHub Actions Job Summary
      - name: Post coverage summary
        if: always()
        run: |
          echo '## Coverage — integration modules' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json \
            | npx --yes json -e '
              const r = this.total;
              console.log(`| Module | Stmts | Branch | Funcs | Lines |`);
              console.log(`|---|---|---|---|---|`);
              Object.entries(this).filter(([k])=>k!="total").forEach(([f,v])=>{
                const s=(x)=>x.pct+"%";
                console.log(`| ${f.split("/").slice(-1)[0]} | ${s(v.statements)} | ${s(v.branches)} | ${s(v.functions)} | ${s(v.lines)} |`);
              });
            ' >> $GITHUB_STEP_SUMMARY || true
