name: Frontend tests

# Запускается при каждом push в ветки main и filtering-2
on:
  push:
    branches:
      - main
      - interactive-charts
    # Запускаем только когда меняется frontend или сам воркфлоу
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'

# Node.js 24 обязателен для actions/setup-node@v6 начиная с 02.06.2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: полная проверка типов (tsc --noEmit)
  # Закрывает разрыв между vitest/esbuild (без тайп-чекинга) и Vercel (tsc -b + vite build)
  # Выполняется параллельно с unit и integration — не увеличивает wall-clock время CI
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (tsc --noEmit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit: полная проверка типов, без генерации JS-вывода
      # Отдельный job — ошибки типов и падения тестов видны раздельно в GitHub Actions UI
      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 1: ESLint
  # Выполняется параллельно с typecheck и тестами — не увеличивает wall-clock время CI
  # Ловит паттерны, которые tsc пропускает: react-hooks, unused vars, import order и т.д.
  # ---------------------------------------------------------------------------
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Job 3: unit-тесты
  # Запускает все *.test.{ts,tsx} кроме интеграционных файлов
  # Глобы src/**/*.test.ts и src/**/*.test.tsx НЕ в кавычках — bash раскрывает
  # их в реальные пути до передачи в vitest (аналогично ветке main)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --exclude в кавычках: передаётся как флаг vitest, он сам обрабатывает паттерн
      # Позиционные аргументы без кавычек: bash раскрывает глобы в список файлов
      - name: Run unit tests
        run: |
          npx vitest run \
            --reporter=verbose \
            --exclude 'src/**/*.integration.test.*' \
            src/**/*.test.ts \
            src/**/*.test.tsx

  # ---------------------------------------------------------------------------
  # Job 4: интеграционные тесты
  # Явные пути к файлам вместо glob — надёжнее glob-матчинга в vitest v4.1.5
  #   - src/components/articles/pagination.integration.test.tsx (пагинация)
  #   - src/App.integration.test.tsx (auth event bus)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Явные пути — bash не раскрывает, vitest получает конкретные файлы
      - name: Run integration tests
        run: |
          npx vitest run \
            --reporter=verbose \
            src/components/articles/pagination.integration.test.tsx \
            src/App.integration.test.tsx \
            src/components/explore/KpiRow.integration.test.tsx

      # Покрытие — все 179 тестов (unit + integration) против расширенного include.
      # Порог statements=70 задан в vite.config.ts coverage.thresholds — упадёт здесь.
      - name: Collect coverage (all tests)
        run: npx vitest run --coverage

      # Публикуем coverage summary в GitHub Actions Job Summary
      - name: Post coverage summary
        if: always()
        run: |
          echo '## Coverage — integration modules' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json \
            | npx --yes json -e '
              const r = this.total;
              console.log(`| Module | Stmts | Branch | Funcs | Lines |`);
              console.log(`|---|---|---|---|---|`);
              Object.entries(this).filter(([k])=>k!="total").forEach(([f,v])=>{
                const s=(x)=>x.pct+"%";
                console.log(`| ${f.split("/").slice(-1)[0]} | ${s(v.statements)} | ${s(v.branches)} | ${s(v.functions)} | ${s(v.lines)} |`);
              });
            ' >> $GITHUB_STEP_SUMMARY || true

  # ---------------------------------------------------------------------------
  # Job 5: Vite production build
  # Верифицирует что приложение собирается так же, как это делает Vercel (tsc -b + vite build).
  # tsc --noEmit ловит ошибки типов, но не проверяет бандлинг: плагины, алиасы, lazy-чанки.
  # Без этого job CI может быть зелёным при красном деплое на Vercel.
  # ---------------------------------------------------------------------------
  build:
    name: Vite build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
