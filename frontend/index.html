<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Dynamically scale down on narrow mobile screens (<412px) to preserve exact layout proportions (baseline: Google Pixel 6a)
      // We calculate the scale explicitly to ensure the browser centers the layout without bleeding off-screen.
      var screenWidth = Math.min(window.screen.width, window.screen.height);
      if (screenWidth < 412) {
        var scale = Math.floor((screenWidth / 412) * 10000) / 10000;
        document.write('<meta name="viewport" content="width=412, initial-scale=' + scale + ', maximum-scale=' + scale + ', user-scalable=no" />');
      } else {
        document.write('<meta name="viewport" content="width=device-width, initial-scale=1.0" />');
      }
    </script>
    <meta name="description" content="AI research publications from Scopus, curated and searchable" />
    <meta name="robots" content="index, follow" />

    <title>Scopus Research Search</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://scopus-search-code.vercel.app/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph (соцсети, мессенджеры) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scopus-search-code.vercel.app/" />
    <meta property="og:title" content="Scopus Research Search" />
    <meta property="og:description" content="AI research publications from Scopus, curated and searchable" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Scopus Research Search" />
    <meta name="twitter:description" content="AI research publications from Scopus, curated and searchable" />

    <!-- Google Analytics 4: send_page_view:false — React управляет page views через RootLayout -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { send_page_view: false });
    </script>

    <!-- Google Fonts: Plus Jakarta Sans (body/UI) + Instrument Serif (display/hero) -->
    <!-- §7.2.3: типографика проекта -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
